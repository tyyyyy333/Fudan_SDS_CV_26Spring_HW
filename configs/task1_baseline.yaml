seed: 42
device: cuda
profile: high_score
output_dir: outputs/task1/high_score
save_best_by: val_acc
export_predictions: true

data:
  root: data/oxford-iiit-pet
  download: false
  image_size: 256
  batch_size: 64
  num_workers: 8
  val_ratio: 0.2
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  evaluation:
    resize_ratio: 1.14
  augmentation:
    random_resized_crop: true
    crop_scale: [0.85, 1.0]
    crop_ratio: [0.75, 1.3333333333]
    horizontal_flip_prob: 0.5
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.0
    randaugment:
      enabled: false
      num_ops: 2
      magnitude: 7
    mixup:
      alpha: 0.2
      probability: 1.0
      mode: batch
    cutmix:
      alpha: 1.0
      switch_probability: 0.5
    random_erasing:
      enabled: true
      probability: 0.1
      scale: [0.02, 0.1]
      ratio: [0.3, 3.3]

model:
  family: resnet
  variant: resnet34
  pretrained: true
  weights_path: null
  attention_reduction: 16
  attention_spatial_kernel_size: 7
  dropout: 0.1
  drop_path_rate: 0.0

optimizer:
  name: adamw
  head_lr: 0.0005
  backbone_lr: 0.00005
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  momentum: 0.9
  nesterov: true

scheduler:
  name: cosine
  warmup_epochs: 3
  warmup_start_factor: 0.1
  min_lr_ratio: 0.01

train:
  epochs: 50
  freeze_backbone_epochs: 0
  label_smoothing: 0.05
  amp: true
  log_interval: 10
  early_stopping:
    enabled: true
    patience: 25

evaluation:
  top_k_misclassified: 30
  tta_horizontal_flip: true

tuning:
  output_dir: outputs/task1/tuning
  study_name: task1_high_score
  direction: maximize
  n_trials: 8
  timeout_hours: 0.5
  best_run_name: tuned_best
  sampler:
    name: tpe
    multivariate: true
    n_startup_trials: 5
  pruner:
    enabled: true
    n_startup_trials: 5
    n_warmup_steps: 5
  search_space:
    head_lr:
      low: 0.0003
      high: 0.0015
      log: true
    backbone_lr_ratio:
      choices: [0.05, 0.1, 0.2]
    freeze_backbone_epochs:
      choices: [0, 1, 3]
    epochs:
      choices: [30, 50, 70, 100]

sweep:
  experiments:
    - tag: baseline_pretrained_resnet34
      meta:
        group: structure
      model:
        family: resnet
        variant: resnet34
        pretrained: true
    - tag: scratch_resnet34_fair
      meta:
        group: ablation
      model:
        family: resnet
        variant: resnet34
        pretrained: false
      optimizer:
        head_lr: 0.0005
        backbone_lr: 0.0005
      train:
        epochs: 100
        freeze_backbone_epochs: 0
        label_smoothing: 0.0
        early_stopping:
          enabled: false
    - tag: se_resnet34
      meta:
        group: structure
      model:
        family: resnet
        variant: se_resnet34
        pretrained: true
    - tag: cbam_resnet34
      meta:
        group: structure
      model:
        family: resnet
        variant: cbam_resnet34
        pretrained: true
    - tag: swin_tiny
      meta:
        group: structure
      model:
        family: timm
        variant: swin_tiny_patch4_window7_224
        pretrained: true
        dropout: 0.1
      optimizer:
        head_lr: 0.0005
        backbone_lr: 0.00005
