seed: 42
device: cuda
profile: high_score
output_dir: outputs/task3/high_score
save_best_by: val_miou
export_predictions: true

data:
  root: data/oxford_iiit_pet_hf_seg
  download: false
  image_size: 256
  batch_size: 12
  num_workers: 4
  val_ratio: 0.2
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  augmentation:
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.0
    shift_scale_rotate:
      enabled: true
      shift_limit: 0.05
      scale_limit: 0.1
      rotate_limit: 15
      fill: 0
      fill_mask: 1
      probability: 0.5
    color_jitter:
      enabled: true
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.02
      probability: 0.3

model:
  in_channels: 3
  num_classes: 3
  base_channels: 64
  bottleneck_dropout: 0.2
  use_bilinear: false
  init: kaiming

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  name: cosine
  warmup_epochs: 2
  warmup_start_factor: 0.1
  min_lr_ratio: 0.01

train:
  epochs: 50
  amp: true
  log_interval: 10

loss:
  name: ce_dice
  ce_weight: 1.0
  dice_weight: 1.0
  label_smoothing: 0.0
  class_weights: null
  auto_class_weights: true

evaluation:
  prediction_sample_count: 8

sweep:
  experiments:
    - tag: ce_only
      loss:
        name: ce
    - tag: dice_only
      loss:
        name: dice
    - tag: ce_dice
      loss:
        name: ce_dice
